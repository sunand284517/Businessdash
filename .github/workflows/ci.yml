name: CI

on:
  push:
    branches: [ main ]
  pull_request:
    branches: [ main ]

jobs:
  build:
    runs-on: ubuntu-latest

    steps:
      - uses: actions/checkout@v4

      - name: Set up Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'

      - name: Install dependencies
        run: |
          python -m pip install --upgrade pip
          pip install -r requirements.txt

      - name: Sanity import check
        run: |
          python - <<'PY'
          import importlib
          import sys
          reqs = ['streamlit','pandas']
          missing = []
          for r in reqs:
            try:
              importlib.import_module(r)
            except Exception:
              missing.append(r)
          if missing:
            print('Missing requirements: ' + ','.join(missing))
            sys.exit(1)
          print('Import check passed')
          PY

      - name: Build Docker image
        run: docker build -t businessdash:ci .
